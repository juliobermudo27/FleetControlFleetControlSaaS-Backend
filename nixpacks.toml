[phases.setup]
cmds = [
  "curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh",
  "chmod +x dotnet-install.sh",
  "./dotnet-install.sh --version 9.0.100 --install-dir /usr/share/dotnet"
]

[phases.install]
cmds = ["/usr/share/dotnet/dotnet restore"]

[phases.build]
cmds = ["/usr/share/dotnet/dotnet publish src/FleetControl.WebAPI/FleetControl.WebAPI.csproj -c Release -o out"]

[start]
cmd = "/usr/share/dotnet/dotnet out/FleetControl.WebAPI.dll"
